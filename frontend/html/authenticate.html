<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasker</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>

    <header>
        <h1>Tasker</h1>
    </header>


    <main>
       
    <!-- Formulaire connexion -->
    <form id="loginFormBox" aria-labelledby="connexion-title">
        <fieldset>
            <legend id="connexion-title">Connexion</legend>

            <label for="email-login">Email :</label>
            <input type="email" id="email-login" name="email"
                required maxlength="50"
                placeholder="adresse@gmail.com">

            <label for="password-login">Mot de passe :</label>
            <input type="password" id="password-login" name="password"
                required minlength="8" maxlength="20"
                placeholder="Votre mot de passe">

            <button type="submit">Connexion</button>

            <p class="switch-text">
                Pas encore de compte ?
                <span id="showRegisterForm">Créer un compte</span>
            </p>
        </fieldset>
    </form>


    <!-- Formulaire inscription -->
    <form id="registerFormBox" aria-labelledby="inscription-title">
        <fieldset>
            <legend id="inscription-title">Inscription</legend>

            <label for="email-register">Email :</label>
            <input type="email" id="email-register" name="email"
                required maxlength="50"
                placeholder="adresse@gmail.com">

            <label for="password-register">Mot de passe :</label>
            <input type="password" id="password-register" name="password"
                required minlength="8" maxlength="20"
                placeholder="8 à 20 caractères">

            <button type="submit">Créer un compte</button>

            <p class="switch-text">
                Déjà un compte ?
                <span id="showLoginForm">Se connecter</span>
            </p>
        </fieldset>
    </form>
  </main>

   <footer>
        <p>&copy; 2026 Tasker. All rights reserved.</p>
   </footer>
</body>
<script src="../js/authenticate.js" defer></script>
</html>
